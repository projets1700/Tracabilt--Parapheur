services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracaparapheur
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-motdepasse}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracaparapheur"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tracaparapheur
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-motdepasse}
      JWT_SECRET: ${JWT_SECRET:-secret_a_changer_en_production}
      JWT_EXPIRES_IN: 7d
      EAS_WEBHOOK_SECRET: ${EAS_WEBHOOK_SECRET:-98b2a12197e8e21e6aad8333a8d7a805416c0444b39fdaf5fd24346a9a9995bb}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads: